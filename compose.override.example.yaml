# Example local override for production deploys.
#   cp compose.override.example.yaml compose.override.yaml
# Then edit compose.override.yaml with your real values. Docker Compose loads
# compose.override.yaml automatically and merges it over compose.yaml — map-form
# labels merge by key, so you only need to override the keys you change.
#
# compose.override.yaml is gitignored; this example is committed for reference.
services:
  traefik-viewer:
    labels:
      # Your real host rule for this deployment:
      traefik.http.routers.traefik-viewer.rule: "Host(`traefik-viewer.your-domain.example`)"

    # Build the image locally instead of pulling from GHCR (overrides the
    # committed image:). Uncomment to develop against your own source tree:
    # build: .

    # Pin a specific image tag instead of :latest, if you prefer:
    # image: ghcr.io/s3ntin3l8/traefik-dashboard-aggregator:v1.0.0

      # --- Require login via authentik (forward auth) ---------------------------
      # Full guide: docs/authentik.md. Define the `authentik` + `strip-identity`
      # middlewares in your Traefik dynamic config first. The app does no auth
      # itself, so keep :8080 unpublished (compose.yaml already does) and strip
      # client-supplied identity headers at the edge.
      #
      # Protect the app router (strip first, then auth):
      # traefik.http.routers.traefik-viewer.middlewares: "strip-identity@file,authentik@file"
      #
      # Route the outpost path to authentik (login flow + logout link). This must
      # be a separate, more-specific router pointing at your authentik service:
      # traefik.http.routers.traefik-viewer-outpost.rule: "Host(`traefik-viewer.your-domain.example`) && PathPrefix(`/outpost.goauthentik.io/`)"
      # traefik.http.routers.traefik-viewer-outpost.entrypoints: "websecure"
      # traefik.http.routers.traefik-viewer-outpost.tls: "true"
      # traefik.http.routers.traefik-viewer-outpost.service: "authentik"
