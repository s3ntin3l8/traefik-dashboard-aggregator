# traefik-viewer configuration.
# Secrets are referenced from the environment with ${VAR} or ${VAR:-default};
# keep real credentials in a .env file or your orchestrator's secret store.

server:
  listenAddr: ":8080"
  pollInterval: 15s
  requestTimeout: 10s
  domain: in.s3ntin3l8.de        # optional, shown in the UI

# Logs view (optional). Leave url empty to disable the Logs tab.
# labelMapping builds the base LogQL selector, e.g. {job="traefik"}.
loki:
  url: ""                        # e.g. http://loki:3100
  username: ${LOKI_USER:-}
  password: ${LOKI_PASS:-}
  labelMapping:
    job: traefik

instances:
  - name: mgmt
    url: https://192.168.2.157                       # /api is appended; scrape the node directly by LAN IP
    host: traefik.mgmt.in.s3ntin3l8.de               # Host header so the node's /api router matches
    dashboardURL: https://traefik.mgmt.in.s3ntin3l8.de/dashboard/
    insecureSkipVerify: true                         # node serves the Traefik default cert on bare IP
    basicAuth:
      username: ${MGMT_API_USER:-admin}
      password: ${MGMT_API_PASS}

  - name: dockerhost
    url: https://192.168.2.96
    host: traefik.dockerhost.in.s3ntin3l8.de
    dashboardURL: https://traefik.dockerhost.in.s3ntin3l8.de/dashboard/
    insecureSkipVerify: true
    basicAuth:
      username: ${DOCKERHOST_API_USER:-admin}
      password: ${DOCKERHOST_API_PASS}
