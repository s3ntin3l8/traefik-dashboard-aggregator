# traefik-viewer configuration — example.
#
# Copy to config.yaml and edit. Each instance is scraped directly by its LAN IP,
# with a `host` header so the node's `Host(...)` /api router matches. The API may
# be open (no credentials) or protected by basic auth — see the security note.
#
# Secrets (if any) are referenced from the environment with ${VAR} or
# ${VAR:-default}; keep real credentials in a .env file or your orchestrator's
# secret store, never in this file.
#
# NOTE: ${...} expansion runs over the whole file, so a bare "$word" is also
# treated as an env reference (an unset one becomes empty). If a value must
# contain a literal "$" (e.g. a password or regex), pass it via a ${VAR} ref.

server:
  listenAddr: ":8080"
  pollInterval: 15s
  requestTimeout: 10s
  domain: example.com            # optional, shown in the UI

# Logs view (optional). Leave url empty to disable the Logs tab.
# Default selector is {job="docker", container="traefik"}.
# The app automatically appends ,instance="<name>" when filtering by node.
loki:
  url: ""                        # e.g. http://loki:3100
  username: ${LOKI_USER:-}
  password: ${LOKI_PASS:-}
  # labelMapping:                # optional override for the base selector
  #   job: docker
  #   container: traefik

instances:
  # One entry per Traefik instance (gateway + each downstream node).
  # role: "gateway" renders this instance as the central hub in the topology
  # view. Omit it (or use role: node) for downstream nodes — that's the default.
  - name: gateway
    role: gateway
    url: https://10.0.0.1                       # scrape the node directly by LAN IP
    host: traefik-gateway.example.com           # Host header so the node's /api router matches
    dashboardURL: https://traefik-gateway.example.com/dashboard/   # optional deep link
    insecureSkipVerify: true                    # if the node serves a default/self-signed cert on its IP
    # basicAuth:                                 # uncomment if /api requires auth
    #   username: ${GATEWAY_API_USER}
    #   password: ${GATEWAY_API_PASS}

  - name: node-01
    url: https://10.0.0.11
    host: traefik.node-01.example.com
    dashboardURL: https://traefik.node-01.example.com/dashboard/
    insecureSkipVerify: true
    # basicAuth:
    #   username: ${NODE01_API_USER}
    #   password: ${NODE01_API_PASS}

  - name: node-02
    url: https://10.0.0.12
    host: traefik.node-02.example.com
    dashboardURL: https://traefik.node-02.example.com/dashboard/
    insecureSkipVerify: true
    # basicAuth:
    #   username: ${NODE02_API_USER}
    #   password: ${NODE02_API_PASS}
