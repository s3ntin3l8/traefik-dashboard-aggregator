# Development: Go backend with live reload (air) + Vite dev server with HMR.
# Run:  docker compose -f compose-dev.yaml up --build
# UI:   http://localhost:5173  (proxies /api to the backend)
services:
  backend:
    image: golang:1.23-alpine
    working_dir: /src
    command: sh -c "go run ./cmd/server -config /config/config.yaml -debug"
    env_file: .env
    environment:
      - TV_CONFIG=/config/config.yaml
    volumes:
      - ./:/src
      - ./config.yaml:/config/config.yaml:ro
      - go-mod:/go/pkg/mod
    ports:
      - "8080:8080"
    develop:
      watch:
        - path: ./internal
          action: rebuild
        - path: ./cmd
          action: rebuild

  frontend:
    image: node:24-alpine
    working_dir: /web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_TARGET=http://backend:8080
    volumes:
      - ./web:/web
      - web-node-modules:/web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  go-mod:
  web-node-modules:
