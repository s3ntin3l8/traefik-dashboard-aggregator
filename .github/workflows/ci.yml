name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Go (build · vet · test)
    uses: s3ntin3l8/.github/.github/workflows/ci-go.yml@main
    secrets: inherit

  frontend:
    name: Web (typecheck · build)
    # Pin to the feature branch until s3ntin3l8/.github PR #6 (ci-node
    # working-directory / cache-dependency-path inputs) is merged; then
    # change the ref to @main.
    uses: s3ntin3l8/.github/.github/workflows/ci-node.yml@feat/ci-node-working-dir
    with:
      node-version: '24'
      working-directory: web
      cache-dependency-path: web/package-lock.json
      test-script: test:coverage
    secrets: inherit

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: traefik-viewer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
