name: Release

# Build and publish the container image to GitHub Container Registry on release
# tags like v1.2.3 only. Pushes to main are build-validated by ci.yml (no push),
# so the registry isn't littered with a new image on every commit.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,format=short
      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Release bodies render like comments: every newline is a hard <br>,
        # unlike markdown files where it's a soft break. So unwrap the
        # changelog's 80-column continuation lines into one line per bullet
        # (and keep blank lines, which separate the headings).
        run: |
          notes="$(awk '/^## \[${{ github.ref_name }}\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md \
            | sed '/^---$/d' \
            | awk 'function flushbuf(){if (buf != "") print buf; buf=""}
                   /^[[:space:]]*$/ {flushbuf(); print; next}
                   /^[[:space:]]*([-*>#]|[0-9]+\.)/ {flushbuf(); buf=$0; next}
                   {line=$0; sub(/^[[:space:]]+/,"",line); buf=(buf=="" ? line : buf " " line)}
                   END{flushbuf()}')"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$notes" \
            --verify-tag
